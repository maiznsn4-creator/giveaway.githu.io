<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Store | Mega Giveaway</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Moul&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg-color: #e0e5ec;
            --text-color: #31344b;
            --main-accent: #0088cc;
            --gold: #f1c40f;
            --shadow-raised: 6px 6px 12px #a3b1c6, -6px -6px 12px #ffffff;
            --shadow-pressed: inset 4px 4px 8px #a3b1c6, inset -4px -4px 8px #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kantumruy Pro', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }

        .container { width: 100%; max-width: 450px; }
        .card { background-color: var(--bg-color); border-radius: 30px; padding: 25px; box-shadow: var(--shadow-raised); text-align: center; border: 1px solid rgba(255,255,255,0.2); }

        .prize-badge {
            background: var(--gold); color: #000; padding: 10px; border-radius: 15px;
            font-weight: bold; font-size: 18px; margin-bottom: 15px; display: inline-block;
            box-shadow: 0 4px 10px rgba(241, 196, 15, 0.3);
        }

        h2 { font-family: 'Moul', serif; color: var(--main-accent); font-size: 18px; margin-bottom: 5px; }
        .subtitle { font-size: 13px; opacity: 0.7; margin-bottom: 20px; }

        .channel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-link { 
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px; border-radius: 15px; background: var(--bg-color); 
            box-shadow: var(--shadow-raised); text-decoration: none; color: var(--text-color); 
            font-weight: bold; font-size: 11px; transition: 0.2s;
        }
        .btn-link i { color: #0088cc; }
        .btn-link:active { box-shadow: var(--shadow-pressed); }

        .btn-main { 
            width: 100%; padding: 16px; border-radius: 18px; border: none; 
            background: var(--main-accent); color: white; font-weight: bold; 
            font-size: 16px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,136,204,0.3);
            transition: 0.3s;
        }

        #step2, #already-joined { display: none; }
        .user-info { background: var(--bg-color); box-shadow: var(--shadow-pressed); padding: 15px; border-radius: 15px; margin-bottom: 20px; font-size: 14px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="step1">
        <div class="prize-badge"><i class="fas fa-gift"></i> Giveaway $5 x 5 នាក់</div>
        <h2>Select Store</h2>
        <p class="subtitle">សូម Join Channel ទាំង ៥ ដើម្បីមានឱកាសឈ្នះ</p>
        
        <div class="channel-grid">
            <a href="https://t.me/Select_Store1" target="_blank" class="btn-link"><i class="fab fa-telegram"></i> Channel 1</a>
            <a href="https://t.me/Select_Store2" target="_blank" class="btn-link"><i class="fab fa-telegram"></i> Channel 2</a>
            <a href="https://t.me/wlwmatcha" target="_blank" class="btn-link"><i class="fab fa-telegram"></i> Channel 3</a>
            <a href="https://t.me/yuthsafe" target="_blank" class="btn-link"><i class="fab fa-telegram"></i> Channel 4</a>
            <a href="https://t.me/memosa_bns" target="_blank" class="btn-link" style="grid-column: span 2;"><i class="fab fa-telegram"></i> Channel 5 (Memosa)</a>
        </div>

        <button class="btn-main" onclick="verifyMembership()">ផ្ទៀងផ្ទាត់ និងចូលរួម</button>
    </div>

    <div class="card" id="step2">
        <h2 style="color: #2ecc71;">ផ្ទៀងផ្ទាត់ជោគជ័យ!</h2>
        <p class="subtitle">ពិនិត្យព័ត៌មានរបស់អ្នកមុននឹងបញ្ជូន</p>
        
        <div class="user-info" id="display-user"></div>

        <button class="btn-main" style="background: #2ecc71;" onclick="finalSubmit()">បញ្ជាក់ការចូលរួម</button>
    </div>

    <div class="card" id="already-joined">
        <i class="fas fa-check-circle" style="font-size: 60px; color: #2ecc71; margin-bottom: 20px;"></i>
        <h2>អ្នកបានចូលរួមរួចហើយ!</h2>
        <p class="subtitle">សូមរង់ចាំការប្រកាសលទ្ធផលក្នុង Channel។</p>
        <button class="btn-main" onclick="tg.close()">ចាកចេញ</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); 

    const BOT_TOKEN = "8212122943:AAFOREIno5CXRklS_X9Kiwz6iAput2zExtI";
    // បញ្ជី ID Channel ទាំង ៥
    const CHANNELS = ["-1002259615654", "-1001844015273", "-1003895190674", "-1002549133921", "-1003652130893"];
    const ADMIN_GROUP = "-1003849367168";

    tg.CloudStorage.getItem('giveaway_2024_status', (err, value) => {
        if (value === 'joined') {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('already-joined').style.display = 'block';
        }
    });

    async function verifyMembership() {
        const user = tg.initDataUnsafe.user;
        if(!user) return Swal.fire('បញ្ជាក់', 'សូមបើកកម្មវិធីនេះក្នុង Telegram!', 'error');

        Swal.fire({ title: 'កំពុងពិនិត្យ...', didOpen: () => Swal.showLoading() });

        let allJoined = true;
        for (let cid of CHANNELS) {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChatMember?chat_id=${cid}&user_id=${user.id}`);
                const data = await res.json();
                if (!data.ok || !['member', 'administrator', 'creator'].includes(data.result.status)) {
                    allJoined = false;
                    break;
                }
            } catch (e) { allJoined = false; }
        }

        Swal.close();
        if (allJoined) {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            document.getElementById('display-user').innerHTML = `
                <b>🆔 ID:</b> ${user.id}<br>
                <b>👤 ឈ្មោះ:</b> ${user.first_name} ${user.last_name || ''}<br>
                <b>🔗 Username:</b> @${user.username || 'មិនមាន'}
            `;
        } else {
            Swal.fire('មិនទាន់គ្រប់លក្ខខណ្ឌ', 'សូម Join Channel ទាំង ៥ ឱ្យគ្រប់សិន!', 'warning');
        }
    }

    async function finalSubmit() {
        const user = tg.initDataUnsafe.user;
        const message = `🎊 អ្នកចូលរួម GIVEAWAY ថ្មី! 🎊\n\n🆔 ID: ${user.id}\n👤 ឈ្មោះ: ${user.first_name}\n🔗 User: @${user.username || 'N/A'}\n✅ ស្ថានភាព: បាន Join ទាំង ៥ Channel\n🛡️ Cloud Verified: ជាប់`;

        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_GROUP}&text=${encodeURIComponent(message)}`);
            tg.CloudStorage.setItem('giveaway_2024_status', 'joined');
            Swal.fire('ជោគជ័យ', 'អ្នកបានចូលរួមក្នុងកម្មវិធី Giveaway ហើយ!', 'success').then(() => {
                tg.close();
            });
        } catch (e) {
            Swal.fire('Error', 'មានបញ្ហាបច្ចេកទេស!', 'error');
        }
    }
</script>
</body>
</html>
